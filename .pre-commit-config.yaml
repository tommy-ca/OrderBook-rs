repos:
  # Rust formatting and linting
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        name: Rust fmt
        description: Format Rust code with rustfmt
        entry: rustfmt
        language: system
        files: \.rs$
        args: [--edition=2021]
      - id: clippy
        name: Rust clippy
        description: Lint Rust code with clippy
        entry: bash -c 'cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        files: \.rs$
        pass_filenames: false

  # Python formatting and linting with ruff (uv-compatible)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        name: Python Ruff Linter
        description: Lint Python code with ruff
        args: [ --fix ]
      - id: ruff-format
        name: Python Ruff Formatter
        description: Format Python code with ruff

  # JavaScript/TypeScript formatting and linting
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.57.0
    hooks:
      - id: eslint
        name: JavaScript ESLint
        description: Lint JavaScript/TypeScript with ESLint
        files: \.(js|ts|jsx|tsx)$
        args: [--fix]
        additional_dependencies:
          - eslint@8.57.0
          - '@typescript-eslint/eslint-plugin@6.21.0'
          - '@typescript-eslint/parser@6.21.0'

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Prettier
        description: Format JavaScript/TypeScript/JSON/YAML with Prettier
        files: \.(js|ts|jsx|tsx|json|yaml|yml|md)$
        args: [--write]

  # General formatting and validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        description: Remove trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
        description: Ensure files end with newline
      - id: check-yaml
        name: Check YAML
        description: Validate YAML files
      - id: check-json
        name: Check JSON
        description: Validate JSON files
      - id: check-toml
        name: Check TOML
        description: Validate TOML files
      - id: check-merge-conflict
        name: Check merge conflicts
        description: Check for merge conflict markers
      - id: check-case-conflict
        name: Check case conflicts
        description: Check for case conflicts
      - id: mixed-line-ending
        name: Fix line endings
        description: Fix mixed line endings
        args: [--fix=lf]

  # Cargo.toml formatting
  - repo: https://github.com/DevinR528/cargo-sort
    rev: v1.0.9
    hooks:
      - id: cargo-sort
        name: Cargo sort
        description: Sort Cargo.toml dependencies
        files: Cargo\.toml$

  # Security checks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        description: Detect secrets in code
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
            \.git/.*|
            \.secrets\.baseline|
            benchmark_results_.*\.json|
            target/.*|
            node_modules/.*
          )$

# Configuration for specific tools
default_language_version:
  python: python3
  node: system

# Performance optimizations
default_stages: [commit, push]
fail_fast: false
minimum_pre_commit_version: 3.0.0